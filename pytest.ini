[pytest]
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

markers =
    smoke:      Critical happy-path tests (run first in CI)
    regression: Full regression suite
    api:        REST API tests
    ui:         Browser/Playwright UI tests
    sanity:     Quick sanity checks
    unit:       Unit tests with no external dependencies

addopts =
    --tb=short
    -v

testpaths =
    apps
